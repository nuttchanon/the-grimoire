name: publish

# Auto-publish to npm when a release tag is pushed (`git push origin vX.Y.Z`).
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. Configure the trusted publisher
# once at npmjs.com → package → Settings → Trusted Publisher (GitHub Actions, repo
# nuttchanon/the-grimoire, workflow publish.yml). `id-token: write` below is what mints the OIDC token.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24" # current LTS, matches local dev; node --test glob needs >=21
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # Trusted Publishing (OIDC) needs npm >= 11.5.1
      - run: npm test
      - run: npm publish --provenance --access public
