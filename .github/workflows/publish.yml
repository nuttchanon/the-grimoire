name: publish

# Auto-publish to npm when a release tag is pushed (`git push origin vX.Y.Z`).
# Requires the repo secret NPM_TOKEN (an npm automation token with publish rights).
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # node --test glob ("test/**/*.test.mjs") needs >=21
          registry-url: "https://registry.npmjs.org"
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
